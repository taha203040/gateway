services:
  kong:
    image: kong
    volumes:
      - "./gateway/config:/usr/local/kong/declarative"
    #  - "./logs/file.log:/file.log"
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
      - KONG_LOG_LEVEL=debug
      - KONG_PLUGINS=bundled
    ports:
      - "8000:8000/tcp"
      - "127.0.0.1:7990:8001/tcp"
      - "8001:8001/tcp"
      - "8443:8443/tcp"
      - "127.0.0.1:8444:8444/tcp" 
  auth-service:
    container_name: auth
    build: 
      context : ./auth
      dockerfile: Dockerfile.dev
    # image: auth
    expose:
      - "3000"
    # env_file: ./auth/.env
    develop:
      watch:
        - path: ./auth/package.*.json
          target: ./app
          action: rebuild
        - path: ./auth
          target: /app
          action: sync
  checkout-service:
    container_name: checkout
    build: 
      context:  ./checkout
      dockerfile: Dockerfile.dev

    # image: checkout
    expose:
      - "4000"         # NOT exposed to host, only nginx can reach it
    # env_file: ./checkout/.env
    develop:
      watch:
        - path: ./checkout/package.*.json
          target: ./app
          action: rebuild
        - path: ./checkout
          target: /app
          action: sync
  mongo-auth:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_auth_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=1234

  mongodb-checkout:
    image: mongo:latest
    container_name: mongodb-checkout
    ports:
      - "27018:27017"
    volumes:
      - mongodb_checkout_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=1234

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - path: ./frontend/package.*.json
          target: /app
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync
volumes:
  mongodb_auth_data:
  mongodb_checkout_data:
