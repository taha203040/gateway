events {
  worker_connections 1024;
}

http {

  # ── Load public key into memory once when Nginx boots ──
  # This is what eliminates the round trip — no file I/O per request
  init_by_lua_block {
    local f = io.open("/etc/nginx/keys/public.pem", "r")
    if not f then
      error("[nginx] could not open public.pem — check the keys/ volume mount")
    end
    jwt_public_key = f:read("*all")
    f:close()
    ngx.log(ngx.NOTICE, "[nginx] public key loaded into memory")
  }

  server {
    listen 80;

    # ── Public routes — no JWT check ─────────────────────
    # Auth-service handles login and signup directly
    location /auth/ {
      proxy_pass       http://auth-service:3000;
      proxy_set_header Host        $host;
      proxy_set_header X-Real-IP   $remote_addr;
    }

    # ── Protected routes — Lua validates JWT inline ───────
    # access_by_lua_file runs BEFORE proxy_pass
    # pure in-memory crypto — auth-service is never called here
    location /api/ {
      access_by_lua_file /etc/nginx/lua/jwt_verify.lua;

      proxy_pass       http://product-service:4000;
      proxy_set_header Host           $host;
      proxy_set_header X-Real-IP      $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no auth needed) ────────────────────
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}
