events {};
server {
    listen 80;

    # Auth routes (public)
    location /auth/ {
        proxy_pass http://auth-service:3000;
    }

    # Protected routes
    location /api/products {
        auth_request /auth/verify; # Step 1: validate token
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-Id $user_id; # Step 2: forward user info
        proxy_set_header X-User-Role $user_role;
        proxy_pass http://product-service:4000; # Step 3: hit product service
    }

    # Internal verify endpoint (not exposed to client directly)
    location = /auth/verify {
        internal;
        proxy_pass http://auth-service:3000/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
}