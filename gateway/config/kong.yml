_format_version : "2.1"
services: 
  - name : echo-server
    url: http://localhost:8000
    routes :
      - name : echo
        paths :
          - /echo
plugins:
- name: cors
  config:
    origins:
    - 'https://youtube.com'
    methods:
    - GET
    - POST
    headers:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - X-Auth-Token
    - Authorization
    exposed_headers:
    - X-Auth-Token
    credentials: true
    max_age: 3600
    preflight_continue: false
- name: rate-limiting
  config: 
#    second: 5
    hour: 100
    policy: local
    fault_tolerant: true
    hide_client_headers: false
    redis_ssl: false
    redis_ssl_verify: false
# comment these if you don't want to store rate limiting data in redis
#    policy: redis
#    redis_host: 172.27.59.36
#    redis_password: example

- name: ip-restriction
  config:
    deny:
      - 203.0.113.1
      - 192.0.2.0/24
      # - 172.18.0.1
    message: cannot access
    status : 401
- name: bot-detection
  config:
    allow: 
    deny: 
      - "curl"

- name: proxy-cache
  config:
      response_code:
      - 200
      request_method:
      - GET
      content_type:
      - text/plain
      - application/json
      cache_ttl: 300
      strategy: memory
consumers:
  - custom_id: '1234'
    username: jjjj
    tags:
    - silver-tier
